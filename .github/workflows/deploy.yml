name: Deploy to cPanel

on:
  push:
    branches:
      - main # O'zingizning asosiy branchingizni belgilang

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20.14.0" 

      - name: Install dependencies
        run: |
          cd backend
          npm install
          cd ../frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload backend files
        uses: SamKirkland/FTP-Deploy-Action@4.1.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          protocol: ftp
          server-dir: /home/airventn/public_html/backend/

      - name: Upload frontend files
        uses: SamKirkland/FTP-Deploy-Action@4.1.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./frontend/dist/
          server-dir: /home/airventn/public_html/frontend/

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy Nginx config
        run: |
          scp -o StrictHostKeyChecking=no ./nginx.conf airventn@162.55.134.175:/etc/nginx/conf.d/airventnavoi.uz.conf

      - name: Restart Nginx
        run: |
          ssh -o StrictHostKeyChecking=no airventn@162.55.134.175 "sudo systemctl restart nginx"
